<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>My Subjects</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 30px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }

      th,
      td {
        padding: 12px;
        border: 1px solid #ddd;
        text-align: center;
      }

      th {
        background: #2c3e50;
        color: white;
      }

      a {
        display: inline-block;
        margin-bottom: 20px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h2>My Subjects</h2>

    <a href="/student/dashboard">← Back to Dashboard</a>

    <table>
      <tr>
        <th>Subject Code</th>
        <th>Subject Name</th>
        <th>Credits</th>
        <th>Lecturer</th>
      </tr>

      <tr th:each="item : ${subjectList}">
        <td th:text="${item.subject.subjectCode}"></td>

        <td th:text="${item.subject.subjectName}"></td>

        <td th:text="${item.subject.credits}"></td>

        <td th:text="${item.subject.lecturer.lecturerName}"></td>
      </tr>
    </table>
  </body>
</html>
